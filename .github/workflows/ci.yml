name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O2"

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        run: ./build/gb-dmg --test

      - name: Package binary
        run: |
          mkdir -p dist/gb-dmg-linux-x64
          cp build/gb-dmg LICENSE README.md dist/gb-dmg-linux-x64/
          tar -C dist -czf dist/gb-dmg-linux-x64.tar.gz gb-dmg-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gb-dmg-linux-x64
          path: dist/gb-dmg-linux-x64.tar.gz
          if-no-files-found: error

  windows:
    name: Windows (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gcc
            git

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        run: ./build/gb-dmg.exe --test
